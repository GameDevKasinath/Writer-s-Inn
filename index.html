<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Writer's Inn</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Google Fonts (Classy Combo) -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAVBAR -->
<header>
  <div class="logo">
    <img src="images/logo.jpg">
  </div>

  <nav>
    <a href="#">Home</a>
    <a href="#rooms">Rooms</a>
    <a href="#gallery">Gallery</a>
    <a href="#contact">Contact</a>
  </nav>
</header>

<!-- HERO -->
<section class="hero">
  <div class="hero-content">
    <h1>Writer's Inn</h1>
    <p>A peaceful retreat crafted for stories, silence and soul.</p>
    <a href="#rooms" class="btn">Explore</a>
  </div>
</section>

<!-- ROOMS -->
<section id="rooms" class="section">
  <h2>Our Rooms</h2>

  <div class="cards">
    <div class="card">
      <img src="images/room1.jpg">
      <h3>Heritage Double Room</h3>
    </div>

    <div class="card">
      <img src="images/room2.jpg">
      <h3>Heritage Twin Room</h3>
    </div>
  </div>
</section>

<!-- GALLERY -->
<section id="gallery" class="section dark">
  <h2>Gallery</h2>

  <div class="gallery">
    <img src="images/room1.jpg">
    <img src="images/room2.jpg">
    <img src="images/hero.jpg">
  </div>
</section>

<!-- CONTACT -->
<section id="contact" class="section">
  <h2>Contact</h2>
  <p>Book your stay via WhatsApp</p>
  <a href="#" class="btn">Chat Now</a>
</section>

<script src="script.js"></script>

</body>
</html>
